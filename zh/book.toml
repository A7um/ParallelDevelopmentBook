[book]
title = "并行开发：如何让多个 AI Agent 并行推进而质量不崩塌"
authors = ["Atum <https://atum.li>"]
description = "如何让多个 AI 编程 Agent 并行工作而质量不崩塌 — 磨合期、三把钥匙、调度模式，以及你真正要付出的代价。"
language = "zh-CN"
multilingual = false
src = "book"

[build]
build-dir = "../_book/zh"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/A7um/ParallelDevelopmentBook"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/A7um/ParallelDevelopmentBook/edit/main/zh/{path}"
site-url = "/ParallelDevelopmentBook/zh/"
additional-css = ["../theme/custom.css"]
additional-js = ["../theme/language-switcher.js", "../theme/mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
