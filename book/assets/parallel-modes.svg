<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" role="img" aria-labelledby="t4 d4">
  <title id="t4">Four parallel scheduling modes</title>
  <desc id="d4">From coarse cross-project to fine agent-internal</desc>
  <style>
    .m1{fill:#e3f2fd;stroke:#1565c0;stroke-width:2}
    .m2{fill:#e8f5e9;stroke:#2e7d32;stroke-width:2}
    .m3{fill:#fff8e1;stroke:#f9a825;stroke-width:2}
    .m4{fill:#fce4ec;stroke:#c2185b;stroke-width:2}
    .t{font:14px ui-sans-serif,sans-serif;font-weight:600;fill:#1a1a1a}
    .s{font:11px ui-sans-serif,sans-serif;fill:#444}
  </style>
  <text x="360" y="26" text-anchor="middle" style="font:15px ui-sans-serif,sans-serif;font-weight:600">Granularity: coarse to fine (typical coordination cost rises then falls at steady state)</text>
  <rect class="m1" x="40" y="48" width="640" height="52" rx="10"/>
  <text x="60" y="82" class="t">Mode 1</text>
  <text x="140" y="82" class="s">Separate repos / products · lowest coupling</text>
  <rect class="m2" x="60" y="112" width="600" height="52" rx="10"/>
  <text x="80" y="146" class="t">Mode 2</text>
  <text x="160" y="146" class="s">Same repo, git worktrees, orthogonal features</text>
  <rect class="m3" x="100" y="176" width="520" height="52" rx="10"/>
  <text x="120" y="210" class="t">Mode 3</text>
  <text x="200" y="210" class="s">Same feature: backend tests / UI tests / bug sweep in parallel</text>
  <rect class="m4" x="180" y="240" width="360" height="52" rx="10"/>
  <text x="200" y="274" class="t">Mode 4</text>
  <text x="280" y="274" class="s">Sub-agents inside one task · needs clear contracts first</text>
  <text x="360" y="308" text-anchor="middle" class="s">Wider bar = more isolation; Mode 4 is narrow because shared context must be tight</text>
</svg>
